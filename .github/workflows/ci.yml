name: CI
on:
  pull_request:
    types: [opened, synchronize, reopened] # these are the defaults - synchronize means 'commits pushed to PR'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  golang-ci:
    uses: cccteam/github-workflows/.github/workflows/golang-ci.yml@1ccb2a0d5c48271b34c23abb3821e365019838be # v5.24.0
    with:
      build-tags: '[""]'
      golangci-lint-version: 'v2.11.4'
  semantic-pull-request-title:
    uses: cccteam/github-workflows/.github/workflows/semantic-pull-request-title.yml@1ccb2a0d5c48271b34c23abb3821e365019838be # 5.24.0
